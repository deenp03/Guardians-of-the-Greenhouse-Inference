name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "gradio_demo/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://KayenM:${HF_TOKEN}@huggingface.co/spaces/KayenM/greenhouse-sam3 /tmp/hf-space

          # Clear old content (preserve .git)
          cd /tmp/hf-space
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy gradio_demo contents to Space root
          # HF Spaces expects app.py + requirements.txt at root level
          cp -R "$GITHUB_WORKSPACE/gradio_demo/." .

          # Configure git and push
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git -c user.name="GitHub Actions" \
                -c user.email="actions@github.com" \
                commit -m "Deploy from ${GITHUB_SHA::7}"
            git push
            echo "Deployed successfully."
          fi
