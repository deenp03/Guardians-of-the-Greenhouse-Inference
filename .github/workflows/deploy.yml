name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://deenp03:${HF_TOKEN}@huggingface.co/spaces/deenp03/Guardians-of-the-Greenhouse-Inference /tmp/hf-space

          cd /tmp/hf-space
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          rsync -av --exclude='.git' --exclude='.github' "$GITHUB_WORKSPACE/" .

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git -c user.name="GitHub Actions" \
                -c user.email="actions@github.com" \
                commit -m "Deploy from ${GITHUB_SHA::7}"
            git push
            echo "Deployed successfully."
          fi

      - name: Wait for Space to be Running
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_ID: "deenp03/Guardians-of-the-Greenhouse-Inference"
        run: |
          pip install -q huggingface_hub

          python -c "
          import time, os, sys
          from huggingface_hub import HfApi

          api     = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['SPACE_ID']

          print('Waiting for Space to reach RUNNING state...')

          start = time.time()
          while True:
              if time.time() - start > 900:
                  print('Timeout: Space took too long to start.')
                  sys.exit(1)

              try:
                  info  = api.space_info(repo_id=repo_id)
                  stage = info.runtime.stage
                  print(f'  Status: {stage}')

                  if stage == 'RUNNING':
                      print('Space is live!')
                      sys.exit(0)

                  if stage in ('BUILD_ERROR', 'RUNTIME_ERROR', 'CONFIG_ERROR'):
                      print(f'Deployment failed with stage: {stage}')
                      sys.exit(1)

              except Exception as e:
                  print(f'  Error querying API: {e}')

              time.sleep(15)
          "

      - name: Verify health endpoint
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            https://deenp03-guardians-of-the-greenhouse-inference.hf.space/api/health
          echo "Health check passed."
